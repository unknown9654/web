name: 部署前进民爆安全家书

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 获取网页文件
        uses: actions/checkout@v4

      - name: 准备 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: 准备 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建网页
        run: pnpm run build

      - name: 保留静态资源目录
        run: touch out/.nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布网页
        id: deployment
        uses: actions/deploy-pages@v4
